<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-label="CSS Grid template areas diagram showing a page layout with header spanning full width, sidebar and main content in the middle row, and footer spanning full width">
  <defs>
    <style>.lbl { font-family: ui-monospace, monospace; font-size: 13px; }</style>
  </defs>

  <text x="20" y="20" class="lbl" font-size="12" fill="#94a3b8">grid-template-areas layout</text>

  <!-- Header — full width -->
  <rect x="20" y="32" width="520" height="60" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="68" class="lbl" fill="#93c5fd" text-anchor="middle">header</text>

  <!-- Sidebar -->
  <rect x="20" y="104" width="140" height="140" rx="4" fill="#3b1f6b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="90" y="180" class="lbl" fill="#c4b5fd" text-anchor="middle">sidebar</text>

  <!-- Main content -->
  <rect x="172" y="104" width="368" height="140" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="356" y="180" class="lbl" fill="#86efac" text-anchor="middle">main</text>

  <!-- Footer — full width -->
  <rect x="20" y="256" width="520" height="52" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="280" y="287" class="lbl" fill="#94a3b8" text-anchor="middle">footer</text>

  <!-- Column separator -->
  <line x1="160" y1="104" x2="160" y2="244" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Gap annotation -->
  <line x1="160" y1="174" x2="172" y2="174" stroke="#fbbf24" stroke-width="2"/>
  <text x="166" y="168" class="lbl" font-size="10" fill="#fbbf24" text-anchor="middle">gap</text>

  <!-- CSS code annotation -->
  <text x="20" y="324" class="lbl" font-size="11" fill="#64748b">grid-template-areas: "header header" "sidebar main" "footer footer"</text>
</svg>
