<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" role="img" aria-label="Diagram showing the anatomy and syntax of a CSS rule">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glows -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <style>
      .font-sans { font-family: system-ui, -apple-system, Roboto, sans-serif; }
      .font-mono { font-family: "Fira Code", "JetBrains Mono", ui-monospace, monospace; }
      .title { font-size: 26px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #94a3b8; letter-spacing: 1px; }
      
      .code-large { font-size: 38px; font-weight: 700; }
      .label-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
      .label-desc { font-size: 13px; font-weight: 500; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="840" height="500" rx="16" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0,40 L840,40 M0,80 L840,80 M0,120 L840,120 M0,160 L840,160 M0,200 L840,200 M0,240 L840,240 M0,280 L840,280 M0,320 L840,320 M0,360 L840,360 M0,400 L840,400 M0,440 L840,440" />
    <path d="M40,0 L40,500 M80,0 L80,500 M120,0 L120,500 M160,0 L160,500 M200,0 L200,500 M240,0 L240,500 M280,0 L280,500 M320,0 L320,500 M360,0 L360,500 M400,0 L400,500 M440,0 L440,500 M480,0 L480,500 M520,0 L520,500 M560,0 L560,500 M600,0 L600,500 M640,0 L640,500 M680,0 L680,500 M720,0 L720,500 M760,0 L760,500 M800,0 L800,500" />
  </g>

  <text x="420" y="55" class="font-sans title" text-anchor="middle">CSS SYNTAX ANATOMY</text>
  <text x="420" y="80" class="font-sans subtitle" text-anchor="middle">THE STRUCTURE OF A CSS RULESET</text>

  <!-- ============================
       CODE BLOCK
       ============================ -->
  <g transform="translate(180, 150)" filter="url(#shadow)">
    <!-- Main Code Box -->
    <rect width="470" height="240" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    
    <!-- Code Highlight Overlays -->
    <!-- Selector highlight -->
    <rect x="35" y="30" width="85" height="45" rx="6" fill="#06b6d4" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Property highlight -->
    <rect x="75" y="95" width="125" height="42" rx="6" fill="#ec4899" fill-opacity="0.1" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Value highlight (expanded for text) -->
    <rect x="220" y="95" width="180" height="42" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,4"/>
    
    <!-- Brackets/Block highlight -->
    <rect x="135" y="30" width="25" height="45" rx="4" fill="#a855f7" fill-opacity="0.1" stroke="#c084fc" stroke-width="1" stroke-dasharray="2,2"/>
    <rect x="35" y="160" width="25" height="45" rx="4" fill="#a855f7" fill-opacity="0.1" stroke="#c084fc" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Code Text -->
    <!-- h1 -->
    <text x="45" y="65" class="font-mono code-large" fill="#67e8f9" filter="url(#glow-cyan)">h1</text>
    <!-- { -->
    <text x="140" y="65" class="font-mono code-large" fill="#d8b4fe">{</text>
    
    <!-- color -->
    <text x="85" y="130" class="font-mono code-large" fill="#f9a8d4" filter="url(#glow-pink)">color</text>
    <!-- : -->
    <text x="205" y="130" class="font-mono code-large" fill="#e2e8f0">:</text>
    <!-- #3b82f6 -->
    <text x="230" y="130" class="font-mono code-large" fill="#fde68a" filter="url(#glow-amber)">#3b82f6</text>
    <!-- ; -->
    <text x="410" y="130" class="font-mono code-large" fill="#e2e8f0">;</text>
    
    <!-- } -->
    <text x="40" y="195" class="font-mono code-large" fill="#d8b4fe">}</text>
  </g>

  <!-- ============================
       ANNOTATION LINES & LABELS
       ============================ -->
  
  <!-- 1. SELECTOR -->
  <g transform="translate(50, 160)">
    <text x="100" y="0" class="font-sans label-title" fill="#22d3ee" text-anchor="end">Selector</text>
    <text x="100" y="20" class="font-sans label-desc" text-anchor="end">What HTML element(s)</text>
    <text x="100" y="36" class="font-sans label-desc" text-anchor="end">to apply styling to.</text>
    <!-- Pointer Line: ends directly on highlight box edge -->
    <path d="M 120 -5 L 150 -5 L 165 12" stroke="#22d3ee" stroke-width="2" fill="none"/>
    <circle cx="165" cy="12" r="4" fill="#22d3ee" filter="url(#glow-cyan)"/>
  </g>

  <!-- 2. DECLARATION BLOCK -->
  <!-- Shifted left to prevent overflow from screen edge -->
  <g transform="translate(650, 160)">
    <text x="0" y="0" class="font-sans label-title" fill="#c084fc">Declaration Block</text>
    <text x="0" y="20" class="font-sans label-desc">Wraps all styles applied</text>
    <text x="0" y="36" class="font-sans label-desc">to the selector.</text>
    <!-- Pointer Line -->
    <path d="M -20 -5 L -50 -5 L -320 12" stroke="#c084fc" stroke-dasharray="4,4" stroke-width="2" fill="none"/>
    <circle cx="-320" cy="12" r="4" fill="#c084fc"/>
  </g>

  <!-- 3. PROPERTY -->
  <g transform="translate(50, 270)">
    <text x="100" y="0" class="font-sans label-title" fill="#f472b6" text-anchor="end">Property</text>
    <text x="100" y="20" class="font-sans label-desc" text-anchor="end">What feature of the</text>
    <text x="100" y="36" class="font-sans label-desc" text-anchor="end">element to change.</text>
    <!-- Pointer Line -->
    <path d="M 120 -5 L 150 -5 L 205 -15" stroke="#f472b6" stroke-width="2" fill="none"/>
    <circle cx="205" cy="-15" r="4" fill="#f472b6" filter="url(#glow-pink)"/>
  </g>

  <!-- 4. VALUE -->
  <g transform="translate(650, 270)">
    <text x="0" y="0" class="font-sans label-title" fill="#fbbf24">Value</text>
    <text x="0" y="20" class="font-sans label-desc">The specific setting</text>
    <text x="0" y="36" class="font-sans label-desc">for the property.</text>
    <!-- Pointer Line -->
    <path d="M -20 -5 L -50 -5 L -70 -15" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <circle cx="-70" cy="-15" r="4" fill="#fbbf24" filter="url(#glow-amber)"/>
  </g>

  <!-- 5. FULL DECLARATION (Bracket) -->
  <g transform="translate(415, 420)">
    <path d="M -110 -120 L -110 -105 L 180 -105 L 180 -120" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.5" fill="none"/>
    <text x="35" y="-80" class="font-sans label-title" fill="#f8fafc" text-anchor="middle">A Single Declaration</text>
    <text x="35" y="-60" class="font-sans label-desc" text-anchor="middle">(Must end with a semicolon)</text>
  </g>

</svg>
