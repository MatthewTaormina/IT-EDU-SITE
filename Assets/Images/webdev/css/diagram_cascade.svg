<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 460" role="img" aria-label="The CSS Cascade Algorithm stages: Origin, Specificity, and Source Order">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>

    <!-- Card Gradients -->
    <linearGradient id="card-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="card-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#172554" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="card-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#083344" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glowing Lines Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <style>
      .font-sans { font-family: system-ui, -apple-system, Roboto, sans-serif; }
      .font-mono { font-family: "Fira Code", "JetBrains Mono", ui-monospace, monospace; }
      .title { font-size: 26px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #94a3b8; letter-spacing: 1px; }
      .card-title { font-size: 20px; font-weight: 700; fill: #f8fafc; }
      .card-step { font-size: 32px; font-weight: 900; opacity: 0.2; }
      .list-item { font-size: 16px; font-weight: 600; }
      .list-desc { font-size: 13px; font-weight: 400; fill: #94a3b8; }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="840" height="460" rx="16" fill="url(#bg)"/>

  <!-- Subtle Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0,40 L840,40 M0,80 L840,80 M0,120 L840,120 M0,160 L840,160 M0,200 L840,200 M0,240 L840,240 M0,280 L840,280 M0,320 L840,320 M0,360 L840,360 M0,400 L840,400 M0,440 L840,440" />
    <path d="M40,0 L40,460 M80,0 L80,460 M120,0 L120,460 M160,0 L160,460 M200,0 L200,460 M240,0 L240,460 M280,0 L280,460 M320,0 L320,460 M360,0 L360,460 M400,0 L400,460 M440,0 L440,460 M480,0 L480,460 M520,0 L520,460 M560,0 L560,460 M600,0 L600,460 M640,0 L640,460 M680,0 L680,460 M720,0 L720,460 M760,0 L760,460 M800,0 L800,460" />
  </g>

  <!-- Headers -->
  <text x="420" y="60" class="font-sans title" text-anchor="middle">THE CASCADE ALGORITHM</text>
  <text x="420" y="85" class="font-sans subtitle" text-anchor="middle">HOW CSS RESOLVES CONFLICTS (TOP DOWN)</text>

  <!-- Arrow Paths connecting cards -->
  <path d="M 280 230 L 320 230" stroke="#a855f7" stroke-width="2" filter="url(#glow-purple)"/>
  <path d="M 520 230 L 560 230" stroke="#3b82f6" stroke-width="2" filter="url(#glow-blue)"/>

  <!-- ===============================
       STAGE 1: ORIGIN
       =============================== -->
  <g transform="translate(40, 130)" filter="url(#shadow)">
    <rect width="240" height="260" rx="16" fill="url(#card-purple)"/>
    <rect width="240" height="260" rx="16" fill="none" stroke="#d946ef" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <path d="M0,16 Q0,0 16,0 L224,0 Q240,0 240,16 L240,60 L0,60 Z" fill="#d946ef" fill-opacity="0.1"/>
    <text x="120" y="38" class="font-sans card-title" text-anchor="middle">1. Origin</text>
    <text x="210" y="45" class="font-sans card-step" fill="#d946ef" text-anchor="end">01</text>
    
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="200" height="40" rx="6" fill="#701a75" stroke="#d946ef" stroke-opacity="0.5"/>
      <text x="100" y="24" class="font-sans list-item" fill="#fbcfe8" text-anchor="middle">Inline Styles</text>
      
      <rect x="0" y="50" width="200" height="40" rx="6" fill="#1e1b4b" stroke="#8b5cf6" stroke-opacity="0.5"/>
      <text x="100" y="74" class="font-sans list-item" fill="#ddd6fe" text-anchor="middle">Author Styles (CSS)</text>
      
      <rect x="0" y="100" width="200" height="40" rx="6" fill="#0f172a" stroke="#475569" stroke-opacity="0.5"/>
      <text x="100" y="124" class="font-sans list-item" fill="#94a3b8" text-anchor="middle">Browser Defaults</text>
    </g>
    <text x="120" y="235" class="font-sans list-desc" text-anchor="middle" fill="#d946ef">Higher precedence wins.</text>
  </g>

  <!-- ===============================
       STAGE 2: SPECIFICITY
       =============================== -->
  <g transform="translate(320, 130)" filter="url(#shadow)">
    <rect width="200" height="260" rx="16" fill="url(#card-blue)"/>
    <rect width="200" height="260" rx="16" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <path d="M0,16 Q0,0 16,0 L184,0 Q200,0 200,16 L200,60 L0,60 Z" fill="#3b82f6" fill-opacity="0.1"/>
    <text x="100" y="38" class="font-sans card-title" text-anchor="middle">2. Specificity</text>
    <text x="180" y="45" class="font-sans card-step" fill="#3b82f6" text-anchor="end">02</text>
    
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="160" height="40" rx="6" fill="#1e3a8a" stroke="#60a5fa" stroke-opacity="0.5"/>
      <text x="80" y="24" class="font-sans list-item" fill="#bfdbfe" text-anchor="middle">IDs (1-0-0)</text>
      
      <rect x="0" y="50" width="160" height="40" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-opacity="0.5"/>
      <text x="80" y="74" class="font-sans list-item" fill="#93c5fd" text-anchor="middle">Classes (0-1-0)</text>
      
      <rect x="0" y="100" width="160" height="40" rx="6" fill="#1e3a8a" stroke="#2563eb" stroke-opacity="0.3"/>
      <text x="80" y="124" class="font-sans list-item" fill="#60a5fa" text-anchor="middle">Types (0-0-1)</text>
    </g>
    <text x="100" y="235" class="font-sans list-desc" text-anchor="middle" fill="#60a5fa">If tied, moves to next.</text>
  </g>

  <!-- ===============================
       STAGE 3: SOURCE ORDER
       =============================== -->
  <g transform="translate(560, 130)" filter="url(#shadow)">
    <rect width="240" height="260" rx="16" fill="url(#card-cyan)"/>
    <rect width="240" height="260" rx="16" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.3"/>
    
    <path d="M0,16 Q0,0 16,0 L224,0 Q240,0 240,16 L240,60 L0,60 Z" fill="#06b6d4" fill-opacity="0.1"/>
    <text x="120" y="38" class="font-sans card-title" text-anchor="middle">3. Source Order</text>
    <text x="220" y="45" class="font-sans card-step" fill="#06b6d4" text-anchor="end">03</text>
    
    <!-- Code Editor Graphic -->
    <g transform="translate(20, 95)">
      <rect x="0" y="0" width="200" height="100" rx="6" fill="#020617" stroke="#334155"/>
      <text x="10" y="24" class="font-mono list-desc" fill="#94a3b8">1 | p { color: blue; }</text>
      <text x="10" y="44" class="font-mono list-desc" fill="#94a3b8">2 | </text>
      <!-- Winning rule -->
      <rect x="0" y="55" width="200" height="24" fill="#06b6d4" fill-opacity="0.1"/>
      <path d="M0,55 L4,55 L4,79 L0,79 Z" fill="#22d3ee"/>
      <text x="10" y="72" class="font-mono list-desc" fill="#a5f3fc">3 | p { color: red; }</text>
    </g>

    <text x="120" y="225" class="font-sans list-item" fill="#67e8f9" text-anchor="middle">Later Rules Win</text>
    <text x="120" y="245" class="font-sans list-desc" text-anchor="middle" fill="#06b6d4">When origin &amp; specificity tie.</text>
  </g>

</svg>
