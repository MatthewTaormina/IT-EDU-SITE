<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" role="img" aria-label="Anatomy diagram of CSS pseudo-elements showing before, after, first-line, and first-letter on a paragraph element">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Card fills -->
    <linearGradient id="para-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Arrowheads -->
    <marker id="arr-pink"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/>
    </marker>
    <marker id="arr-cyan"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>

    <style>
      .font-sans { font-family: system-ui, -apple-system, Roboto, sans-serif; }
      .font-mono { font-family: "Fira Code", "JetBrains Mono", ui-monospace, monospace; }
      .title    { font-size: 26px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #94a3b8; letter-spacing: 1px; }
      .label    { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
      .code     { font-size: 15px; font-weight: 600; }
      .desc     { font-size: 12px; font-weight: 400; fill: #94a3b8; }
      .para-text { font-size: 15px; fill: #cbd5e1; font-family: Georgia, serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="840" height="500" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#fff" stroke-opacity="0.025" stroke-width="1">
    <path d="M0,40 L840,40 M0,80 L840,80 M0,120 L840,120 M0,160 L840,160 M0,200 L840,200 M0,240 L840,240 M0,280 L840,280 M0,320 L840,320 M0,360 L840,360 M0,400 L840,400 M0,440 L840,440 M0,480 L840,480"/>
    <path d="M40,0 L40,500 M80,0 L80,500 M120,0 L120,500 M160,0 L160,500 M200,0 L200,500 M240,0 L240,500 M280,0 L280,500 M320,0 L320,500 M360,0 L360,500 M400,0 L400,500 M440,0 L440,500 M480,0 L480,500 M520,0 L520,500 M560,0 L560,500 M600,0 L600,500 M640,0 L640,500 M680,0 L680,500 M720,0 L720,500 M760,0 L760,500 M800,0 L800,500"/>
  </g>

  <!-- Title -->
  <text x="420" y="52" class="font-sans title" text-anchor="middle">CSS PSEUDO-ELEMENT ANATOMY</text>
  <text x="420" y="76" class="font-sans subtitle" text-anchor="middle">VIRTUAL NODES INJECTED BY CSS — NOT IN THE DOM</text>

  <!-- =====================================================
       CENTRAL: THE PARAGRAPH ELEMENT (simulated render)
       ===================================================== -->
  <g transform="translate(220, 120)" filter="url(#shadow)">
    <!-- Outer element boundary -->
    <rect width="400" height="270" rx="12" fill="url(#para-grad)" stroke="#334155" stroke-width="1.5"/>

    <!-- Element label tag -->
    <rect x="0" y="0" width="400" height="36" rx="12" fill="#1e293b"/>
    <rect x="0" y="18" width="400" height="18" fill="#1e293b"/>
    <text x="200" y="24" class="font-mono code" fill="#94a3b8" text-anchor="middle" font-size="13">&lt;p&gt; element</text>

    <!-- ::before block -->
    <rect x="16" y="44" width="368" height="32" rx="6" fill="#500724" stroke="#f472b6" stroke-width="1" filter="url(#glow-pink)"/>
    <text x="30" y="63" class="font-mono code" fill="#f9a8d4" font-size="13">::before  →  content: '"'</text>

    <!-- ::first-line highlight band -->
    <rect x="16" y="84" width="368" height="26" rx="0" fill="#1e3a8a" fill-opacity="0.5"/>
    <!-- ::first-letter large cap -->
    <text x="28" y="107" class="font-mono" font-size="36" font-weight="900" fill="#a78bfa" filter="url(#glow-violet)">L</text>
    <!-- First line text -->
    <text x="62" y="103" class="para-text">orem ipsum dolor sit amet, con-</text>
    <!-- Second line text (not highlighted) -->
    <text x="28" y="124" class="para-text">sectetur adipiscing elit. Vivamus</text>
    <!-- Third line -->
    <text x="28" y="144" class="para-text">lacinia odio vitae vestibulum.</text>
    <!-- Fourth line -->
    <text x="28" y="164" class="para-text">Donec in efficitur leo, in com-</text>
    <!-- Fifth line -->
    <text x="28" y="184" class="para-text">modo orci. Curabitur sodales.</text>

    <!-- ::after block -->
    <rect x="16" y="198" width="368" height="32" rx="6" fill="#052e16" stroke="#22d3ee" stroke-width="1" filter="url(#glow-cyan)"/>
    <text x="30" y="218" class="font-mono code" fill="#67e8f9" font-size="13">::after   →  content: ''  (decorative bar)</text>

    <!-- Decorative bar simulated -->
    <rect x="16" y="238" width="60" height="4" rx="2" fill="#22d3ee" fill-opacity="0.7"/>
  </g>

  <!-- =====================================================
       LEFT SIDE: LABEL CARDS
       ===================================================== -->

  <!-- ::before card -->
  <g transform="translate(20, 148)">
    <rect width="178" height="58" rx="10" fill="#2d0a1e" stroke="#f472b6" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#f472b6">::before</text>
    <text x="12" y="40" class="font-sans desc">First child of element.</text>
    <text x="12" y="54" class="font-sans desc">Requires content: ''</text>
  </g>
  <!-- Arrow from ::before card to ::before block -->
  <path d="M198,176 L220,176" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr-pink)" fill="none" filter="url(#glow-pink)"/>

  <!-- ::first-line card -->
  <g transform="translate(20, 240)">
    <rect width="178" height="58" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#818cf8">::first-line</text>
    <text x="12" y="40" class="font-sans desc">First rendered line of</text>
    <text x="12" y="54" class="font-sans desc">a block element.</text>
  </g>
  <!-- Arrow from ::first-line card to first-line highlight -->
  <path d="M198,268 L220,208" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr-violet)" fill="none" filter="url(#glow-violet)"/>

  <!-- ::first-letter card -->
  <g transform="translate(20, 332)">
    <rect width="178" height="58" rx="10" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#a78bfa">::first-letter</text>
    <text x="12" y="40" class="font-sans desc">First character of</text>
    <text x="12" y="54" class="font-sans desc">a block element.</text>
  </g>
  <!-- Arrow from ::first-letter card to the big L -->
  <path d="M198,360 L248,248" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-violet)" fill="none" filter="url(#glow-violet)"/>

  <!-- =====================================================
       RIGHT SIDE: LABEL CARDS
       ===================================================== -->

  <!-- ::after card -->
  <g transform="translate(642, 148)">
    <rect width="178" height="58" rx="10" fill="#022c22" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#22d3ee">::after</text>
    <text x="12" y="40" class="font-sans desc">Last child of element.</text>
    <text x="12" y="54" class="font-sans desc">Requires content: ''</text>
  </g>
  <!-- Arrow from ::after card to ::after block -->
  <path d="M642,176 L620,318" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)" fill="none" filter="url(#glow-cyan)"/>

  <!-- ::placeholder card -->
  <g transform="translate(642, 240)">
    <rect width="178" height="58" rx="10" fill="#451a03" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#fbbf24">::placeholder</text>
    <text x="12" y="40" class="font-sans desc">Hint text inside</text>
    <text x="12" y="54" class="font-sans desc">&lt;input&gt; / &lt;textarea&gt;</text>
  </g>
  <!-- Input mockup (standalone, right side) -->
  <!-- Arrow pointing down to the input -->
  <path d="M731,298 L731,388" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)" fill="none" fill-opacity="0" filter="url(#glow-amber)"/>

  <!-- ::marker card -->
  <g transform="translate(642, 332)">
    <rect width="178" height="58" rx="10" fill="#1c1917" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="12" y="22" class="font-mono label" fill="#d1d5db">::marker</text>
    <text x="12" y="40" class="font-sans desc">Bullet or number of</text>
    <text x="12" y="54" class="font-sans desc">a list item.</text>
  </g>

  <!-- =====================================================
       BOTTOM: INPUT + LIST EXAMPLES
       ===================================================== -->

  <!-- ::placeholder input example -->
  <g transform="translate(220, 420)">
    <rect width="180" height="38" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="12" y="25" class="font-mono desc" fill="#78716c" font-size="13" font-style="italic">Search…  ::placeholder</text>
  </g>

  <!-- ::marker list example -->
  <g transform="translate(440, 416)">
    <!-- Bullet 1 -->
    <circle cx="14" cy="14" r="5" fill="#3b82f6" filter="url(#glow-cyan)"/>
    <text x="26" y="19" class="font-sans desc" font-size="13" fill="#cbd5e1">List item one</text>
    <!-- Bullet 2 -->
    <circle cx="14" cy="36" r="5" fill="#3b82f6" filter="url(#glow-cyan)"/>
    <text x="26" y="41" class="font-sans desc" font-size="13" fill="#cbd5e1">List item two</text>
    <!-- marker label -->
    <text x="120" y="28" class="font-mono label" fill="#94a3b8" font-size="11">::marker</text>
    <!-- arrow pointing at second bullet -->
    <path d="M118,26 L28,30" stroke="#64748b" stroke-width="1" marker-end="url(#arr-amber)" fill="none"/>
  </g>

</svg>
