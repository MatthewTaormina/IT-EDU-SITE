<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" role="img" aria-label="Diagram showing how HTML and CSS combine to render a styled web page">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-html" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-css" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-render" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <style>
      .font-sans { font-family: system-ui, -apple-system, Roboto, sans-serif; }
      .font-mono { font-family: "Fira Code", "JetBrains Mono", ui-monospace, monospace; }
      .title { font-size: 26px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #94a3b8; letter-spacing: 1px; }
      
      .box-title { font-size: 18px; font-weight: 700; }
      .code-text { font-size: 12px; font-weight: 600; font-family: monospace; }
    </style>
  </defs>

  <rect width="840" height="500" rx="16" fill="url(#bg)"/>

  <!-- Main Headers -->
  <text x="420" y="55" class="font-sans title" text-anchor="middle">HOW CSS WORKS</text>
  <text x="420" y="80" class="font-sans subtitle" text-anchor="middle">THE BROWSER COMBINES HTML STRUCTURE WITH CSS STYLING</text>

  <!-- ==================================
       1. HTML BOX (Left) - ORANGE/RED
       ================================== -->
  <g transform="translate(60, 150)" filter="url(#shadow)">
    <!-- Base Card -->
    <rect width="220" height="200" rx="12" fill="#1e1111" stroke="#f97316" stroke-width="2"/>
    <text x="110" y="40" class="font-sans box-title" fill="#fdba74" text-anchor="middle">HTML</text>
    <path d="M 0 55 L 220 55" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- Code logic visualization -->
    <text x="20" y="80" class="code-text" fill="#fdba74">&lt;h1 class="title"&gt;</text>
    <text x="35" y="100" class="code-text" fill="#fed7aa">Hello World</text>
    <text x="20" y="120" class="code-text" fill="#fdba74">&lt;/h1&gt;</text>
    
    <text x="20" y="150" class="code-text" fill="#fdba74">&lt;p&gt;</text>
    <text x="35" y="170" class="code-text" fill="#fed7aa">Content here</text>
    <text x="20" y="190" class="code-text" fill="#fdba74">&lt;/p&gt;</text>

    <!-- Visual icon (Document) -->
    <g transform="translate(160, 15)" stroke="#fdba74" stroke-width="2" fill="none">
      <path d="M0,0 L20,0 L20,24 L0,24 Z" rx="2"/>
      <path d="M5,7 L15,7 M5,12 L15,12 M5,17 L10,17"/>
    </g>
  </g>

  <!-- ==================================
       2. CSS BOX (Top Middle) - BLUE
       ================================== -->
  <g transform="translate(60, 370)" filter="url(#shadow)">
    <!-- Base Card -->
    <!-- In horizontal layout, let's actually just put CSS beside HTML to save vertical space. -->
  </g>
  
  <g transform="translate(310, 150)" filter="url(#shadow)">
    <!-- Base Card -->
    <rect width="220" height="200" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="110" y="40" class="font-sans box-title" fill="#93c5fd" text-anchor="middle">CSS</text>
    <path d="M 0 55 L 220 55" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Code logic visualization -->
    <text x="20" y="80" class="code-text" fill="#60a5fa">.title {</text>
    <text x="35" y="100" class="code-text" fill="#bfdbfe">color: #ec4899;</text>
    <text x="35" y="120" class="code-text" fill="#bfdbfe">font-size: 2rem;</text>
    <text x="20" y="140" class="code-text" fill="#60a5fa">}</text>
    
    <text x="20" y="170" class="code-text" fill="#60a5fa">p { color: gray; }</text>

    <!-- Visual icon (Palette/Code) -->
    <g transform="translate(160, 15)" stroke="#93c5fd" stroke-width="2" fill="none">
      <path d="M0,12 L10,2 L20,12 M2,24 L2,10 L18,10 L18,24"/>
    </g>
  </g>

  <!-- ==================================
       CONNECTION ARROWS
       ================================== -->
  <!-- From HTML -->
  <g filter="url(#glow-html)">
    <path d="M 280 200 L 305 200" stroke="#f97316" stroke-width="3" fill="none"/>
    <polygon points="305,195 315,200 305,205" fill="#f97316"/>
  </g>

  <!-- From CSS -->
  <g filter="url(#glow-css)">
    <path d="M 530 200 L 555 200" stroke="#3b82f6" stroke-width="3" fill="none"/>
    <polygon points="555,195 565,200 555,205" fill="#3b82f6"/>
  </g>
  
  <rect x="290" y="240" width="10" height="10" fill="none" />

  <!-- ==================================
       3. RENDER TREE / BROWSER OUTPUT (Right) - PINK/PURPLE
       ================================== -->
  <g transform="translate(560, 150)" filter="url(#shadow)">
    <!-- Base Card -->
    <rect width="220" height="200" rx="12" fill="#1e111a" stroke="#d946ef" stroke-width="2" filter="url(#glow-render)"/>
    <text x="110" y="40" class="font-sans box-title" fill="#f3a8ff" text-anchor="middle">THE RENDER TREE</text>
    <path d="M 0 55 L 220 55" stroke="#d946ef" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Visual Representation of output -->
    <g transform="translate(20, 80)">
      <!-- Rendered H1 (.title) -->
      <rect x="0" y="0" width="180" height="40" rx="4" fill="#ec4899" fill-opacity="0.2" stroke="#f472b6" stroke-dasharray="2,2"/>
      <text x="90" y="26" class="font-sans" font-size="20" font-weight="800" fill="#f472b6" text-anchor="middle">Hello World</text>

      <!-- Rendered P -->
      <rect x="0" y="55" width="160" height="24" rx="4" fill="#475569" fill-opacity="0.4"/>
      <text x="80" y="72" class="font-sans" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle">Content here</text>
      
      <!-- Rendered P line 2 -->
      <rect x="0" y="85" width="120" height="24" rx="4" fill="#475569" fill-opacity="0.4"/>
    </g>

    <!-- Visual icon (Monitor) -->
    <g transform="translate(175, 18)" stroke="#f3a8ff" stroke-width="2" fill="none">
      <rect x="-10" y="-10" width="26" height="18" rx="2"/>
      <path d="M -2 8 L -2 12 M 8 8 L 8 12 M -6 12 L 12 12"/>
    </g>
  </g>

</svg>
