<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" role="img" aria-label="CSS media query diagram showing a desktop layout with sidebar and main, a breakpoint marker, and a mobile layout with stacked columns">
  <defs>
    <style>.lbl { font-family: ui-monospace, monospace; font-size: 12px; }</style>
  </defs>

  <!-- Desktop -->
  <text x="20" y="20" class="lbl" fill="#22c55e">Desktop (≥ 768px)</text>
  <rect x="20" y="28" width="230" height="140" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <!-- sidebar -->
  <rect x="28" y="36" width="60" height="120" rx="3" fill="#3b1f6b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="58" y="100" class="lbl" fill="#c4b5fd" text-anchor="middle">side</text>
  <text x="58" y="116" class="lbl" fill="#c4b5fd" text-anchor="middle">bar</text>
  <!-- main -->
  <rect x="96" y="36" width="146" height="120" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="169" y="100" class="lbl" fill="#86efac" text-anchor="middle">main content</text>

  <!-- Breakpoint marker -->
  <line x1="280" y1="20" x2="280" y2="190" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="280" y="14" class="lbl" fill="#fbbf24" text-anchor="middle">breakpoint</text>
  <text x="280" y="200" class="lbl" font-size="11" fill="#fbbf24" text-anchor="middle">min-width: 768px</text>

  <!-- Mobile -->
  <text x="310" y="20" class="lbl" fill="#f87171">Mobile (&lt; 768px)</text>
  <rect x="310" y="28" width="130" height="150" rx="4" fill="#0f172a" stroke="#f87171" stroke-width="1.5"/>
  <!-- stacked header -->
  <rect x="318" y="36" width="114" height="36" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="59" class="lbl" fill="#86efac" text-anchor="middle">main content</text>
  <!-- stacked sidebar below -->
  <rect x="318" y="80" width="114" height="36" rx="3" fill="#3b1f6b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="375" y="103" class="lbl" fill="#c4b5fd" text-anchor="middle">sidebar</text>
  <!-- (no footer to maintain consistency with desktop) -->

  <!-- Arrow showing reflow -->
  <text x="495" y="110" class="lbl" fill="#64748b" text-anchor="middle">stacks to</text>
  <text x="495" y="126" class="lbl" fill="#64748b" text-anchor="middle">single column</text>
</svg>
