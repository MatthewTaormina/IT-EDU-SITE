<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" role="img" aria-label="Flexbox container diagram showing main axis (left to right) and cross axis (top to bottom) with three flex items">
  <defs>
    <style>.lbl { font-family: ui-monospace, monospace; font-size: 12px; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Container -->
  <rect x="20" y="30" width="410" height="140" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="36" y="20" class="lbl" fill="#3b82f6">flex container  (display: flex)</text>

  <!-- Flex items -->
  <rect x="40" y="50" width="110" height="100" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="105" class="lbl" fill="#93c5fd" text-anchor="middle">item 1</text>

  <rect x="165" y="50" width="140" height="100" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="235" y="105" class="lbl" fill="#93c5fd" text-anchor="middle">item 2</text>

  <rect x="320" y="50" width="90" height="100" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="365" y="105" class="lbl" fill="#93c5fd" text-anchor="middle">item 3</text>

  <!-- gap annotation -->
  <line x1="150" y1="100" x2="165" y2="100" stroke="#fbbf24" stroke-width="2"/>
  <text x="157" y="96" class="lbl" font-size="10" fill="#fbbf24" text-anchor="middle">gap</text>
  <line x1="310" y1="100" x2="320" y2="100" stroke="#fbbf24" stroke-width="2"/>
  <text x="315" y="96" class="lbl" font-size="10" fill="#fbbf24" text-anchor="middle">gap</text>

  <!-- Main axis arrow -->
  <line x1="30" y1="178" x2="420" y2="178" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="225" y="195" class="lbl" fill="#3b82f6" text-anchor="middle">main axis  →  (flex-direction: row)</text>

  <!-- Cross axis arrow -->
  <line x1="450" y1="50" x2="450" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="450" y="40" class="lbl" fill="#22c55e" text-anchor="middle">cross axis ↓</text>
</svg>
