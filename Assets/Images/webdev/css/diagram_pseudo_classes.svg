<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" role="img" aria-label="Diagram showing four interactive button states: hover, focus, active, and disabled">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <style>
      .font-sans { font-family: system-ui, -apple-system, Roboto, sans-serif; }
      .font-mono { font-family: "Fira Code", "JetBrains Mono", ui-monospace, monospace; }
      .title { font-size: 26px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #94a3b8; letter-spacing: 1px; }
      
      .card-title { font-size: 20px; font-weight: 700; }
      .card-desc { font-size: 13px; font-weight: 500; fill: #94a3b8; }
      .btn-text { font-size: 16px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
      .btn-text-disabled { font-size: 16px; font-weight: 700; fill: #475569; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="840" height="500" rx="16" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0,40 L840,40 M0,80 L840,80 M0,120 L840,120 M0,160 L840,160 M0,200 L840,200 M0,240 L840,240 M0,280 L840,280 M0,320 L840,320 M0,360 L840,360 M0,400 L840,400 M0,440 L840,440 M0,480 L840,480" />
  </g>

  <text x="420" y="55" class="font-sans title" text-anchor="middle">CSS PSEUDO-CLASSES</text>
  <text x="420" y="80" class="font-sans subtitle" text-anchor="middle">STYLING ELEMENTS BASED ON USER INTERACTION OR STATE</text>

  <!-- ===============================
       1. :hover (Target/Cursor)
       =============================== -->
  <g transform="translate(60, 110)" filter="url(#shadow)">
    <!-- Card -->
    <rect width="340" height="170" rx="12" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
    <text x="20" y="35" class="font-mono card-title" fill="#67e8f9">:hover</text>
    <text x="20" y="55" class="font-sans card-desc">Applies when the mouse pointer is over the element.</text>
    
    <!-- Button Area -->
    <g transform="translate(100, 85)">
      <!-- Button Base -->
      <rect x="0" y="0" width="140" height="48" rx="24" fill="#06b6d4" filter="url(#glow-cyan)"/>
      <text x="70" y="29" class="font-sans btn-text" text-anchor="middle">Submit</text>
      
      <!-- Mouse Cursor Icon over button -->
      <g transform="translate(110, 20)">
        <path d="M0,0 L16,16 L9,16 L14,26 L11,28 L6,18 L0,24 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ===============================
       2. :focus (Keyboard Tab Ring)
       =============================== -->
  <g transform="translate(440, 110)" filter="url(#shadow)">
    <!-- Card -->
    <rect width="340" height="170" rx="12" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
    <text x="20" y="35" class="font-mono card-title" fill="#c084fc">:focus</text>
    <text x="20" y="55" class="font-sans card-desc">Applies when element is selected (e.g. via Tab key).</text>
    
    <!-- Button Area -->
    <g transform="translate(100, 85)">
      <!-- Focus Ring Highlight -->
      <rect x="-6" y="-6" width="152" height="60" rx="30" fill="none" stroke="#a855f7" stroke-width="4" filter="url(#glow-purple)"/>
      
      <rect x="0" y="0" width="140" height="48" rx="24" fill="#334155"/>
      <text x="70" y="29" class="font-sans btn-text" text-anchor="middle">Submit</text>
      
      <!-- TAB Key Graphic indicating keyboard nav -->
      <g transform="translate(-40, 12)">
        <rect x="0" y="0" width="30" height="24" rx="4" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="15" y="16" class="font-sans" font-size="9" fill="#e2e8f0" font-weight="700" text-anchor="middle">TAB</text>
      </g>
    </g>
  </g>

  <!-- ===============================
       3. :active (MouseDown)
       =============================== -->
  <g transform="translate(60, 310)" filter="url(#shadow)">
    <!-- Card -->
    <rect width="340" height="170" rx="12" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
    <text x="20" y="35" class="font-mono card-title" fill="#fbbf24">:active</text>
    <text x="20" y="55" class="font-sans card-desc">Applies during the exact moment of a click.</text>
    
    <!-- Button Area -->
    <!-- Translate slightly down & right to simulate physical press -->
    <g transform="translate(102, 87)">
      <!-- Button Base -->
      <rect x="0" y="0" width="136" height="46" rx="23" fill="#d97706" filter="url(#glow-amber)"/>
      
      <!-- Inside click effect / press ring -->
      <circle cx="110" cy="20" r="15" fill="#ffffff" fill-opacity="0.3"/>
      <circle cx="110" cy="20" r="25" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3"/>

      <text x="68" y="28" class="font-sans btn-text" text-anchor="middle" font-size="15">Submit</text>

      <!-- Mouse Cursor Icon actively clicking -->
      <g transform="translate(110, 20)">
        <path d="M0,0 L16,16 L9,16 L14,26 L11,28 L6,18 L0,24 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ===============================
       4. :disabled (Input state)
       =============================== -->
  <g transform="translate(440, 310)" filter="url(#shadow)">
    <!-- Card -->
    <rect width="340" height="170" rx="12" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
    <text x="20" y="35" class="font-mono card-title" fill="#94a3b8">:disabled</text>
    <text x="20" y="55" class="font-sans card-desc">Applies to form elements that cannot be interacted with.</text>
    
    <!-- Button Area -->
    <g transform="translate(100, 85)">
      <!-- Button Base disabled -->
      <rect x="0" y="0" width="140" height="48" rx="24" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="70" y="29" class="font-sans btn-text-disabled" text-anchor="middle">Submit</text>
      
      <!-- Not-allowed Cursor Icon -->
      <g transform="translate(110, 20)">
        <!-- Circle with strike -->
        <circle cx="0" cy="0" r="10" fill="none" stroke="#ef4444" stroke-width="2.5"/>
        <line x1="-7" y1="-7" x2="7" y2="7" stroke="#ef4444" stroke-width="2.5"/>
      </g>
    </g>
  </g>

</svg>
