<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" role="img" aria-label="CSS custom properties diagram showing a variable declared on :root and used in multiple elements">
  <defs>
    <style>.lbl { font-family: ui-monospace, monospace; font-size: 12px; }</style>
    <marker id="arr-right" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- :root declaration -->
  <rect x="20" y="20" width="200" height="100" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <text x="36" y="44" class="lbl" fill="#c4b5fd">:root {</text>
  <text x="52" y="66" class="lbl" fill="#86efac">--color-brand:</text>
  <text x="52" y="86" class="lbl" fill="#fbbf24">  #3b82f6;</text>
  <text x="52" y="104" class="lbl" fill="#86efac">--space-md: 1.5rem;</text>
  <text x="36" y="114" class="lbl" fill="#c4b5fd">}</text>
  <text x="20" y="138" class="lbl" fill="#64748b">Custom properties defined on :root</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="52" x2="285" y2="52" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-right)"/>

  <!-- Button usage -->
  <rect x="290" y="20" width="240" height="64" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="306" y="44" class="lbl" fill="#93c5fd">.btn {</text>
  <text x="322" y="62" class="lbl" fill="#86efac">background: var(--color-brand);</text>
  <text x="306" y="78" class="lbl" fill="#93c5fd">}</text>

  <!-- Arrow 2 -->
  <line x1="220" y1="120" x2="285" y2="120" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-right)"/>

  <!-- Card usage -->
  <rect x="290" y="88" width="240" height="64" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="306" y="112" class="lbl" fill="#86efac">.card {</text>
  <text x="322" y="130" class="lbl" fill="#86efac">padding: var(--space-md);</text>
  <text x="306" y="146" class="lbl" fill="#86efac">}</text>

  <!-- Dark mode override -->
  <rect x="20" y="170" width="510" height="84" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="36" y="194" class="lbl" fill="#94a3b8">@media (prefers-color-scheme: dark) {</text>
  <text x="52" y="214" class="lbl" fill="#94a3b8">:root { --color-brand: #60a5fa; }</text>
  <text x="52" y="230" class="lbl" fill="#64748b">/* All var(--color-brand) references update automatically */</text>
  <text x="36" y="246" class="lbl" fill="#94a3b8">}</text>
</svg>
