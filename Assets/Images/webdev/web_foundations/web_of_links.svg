<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 270" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Page A -->
  <rect x="30" y="107" width="110" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="132" text-anchor="middle" fill="#1e40af" font-weight="600">Page A</text>

  <!-- Page B -->
  <rect x="240" y="40" width="110" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="65" text-anchor="middle" fill="#1e40af" font-weight="600">Page B</text>

  <!-- Page C -->
  <rect x="240" y="180" width="110" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="205" text-anchor="middle" fill="#1e40af" font-weight="600">Page C</text>

  <!-- Page D -->
  <rect x="440" y="40" width="110" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="495" y="65" text-anchor="middle" fill="#1e40af" font-weight="600">Page D</text>

  <!-- Arrow: A → B -->
  <line x1="141" y1="117" x2="238" y2="65" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="183" y="83" text-anchor="middle" fill="#9ca3af" font-size="10" transform="rotate(-22, 183, 83)">link</text>

  <!-- Arrow: A → C -->
  <line x1="141" y1="137" x2="238" y2="192" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="183" y="172" text-anchor="middle" fill="#9ca3af" font-size="10" transform="rotate(22, 183, 172)">link</text>

  <!-- Arrow: B → D -->
  <line x1="352" y1="60" x2="438" y2="60" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="395" y="54" text-anchor="middle" fill="#9ca3af" font-size="10">link</text>

  <!-- Arrow: C → A (back link, curved below) -->
  <path d="M 240,210 C 160,255 80,255 30,150" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="130" y="253" text-anchor="middle" fill="#9ca3af" font-size="10">back link</text>

  <!-- Caption -->
  <text x="290" y="255" text-anchor="middle" fill="#94a3b8" font-size="11">Any page can link to any other — in any direction. This mesh is the "web."</text>
</svg>
