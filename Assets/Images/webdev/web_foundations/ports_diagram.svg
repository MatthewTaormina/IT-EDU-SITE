<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Server machine -->
  <rect x="180" y="20" width="200" height="180" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="280" y="42" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">SERVER MACHINE  (IP: 142.250.80.46)</text>

  <!-- Port 80 -->
  <rect x="200" y="55" width="160" height="34" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="68" text-anchor="middle" fill="#1e40af" font-weight="600">Port 80</text>
  <text x="280" y="81" text-anchor="middle" fill="#3b82f6" font-size="10">HTTP (web traffic)</text>

  <!-- Port 443 -->
  <rect x="200" y="100" width="160" height="34" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="280" y="113" text-anchor="middle" fill="#15803d" font-weight="600">Port 443</text>
  <text x="280" y="126" text-anchor="middle" fill="#16a34a" font-size="10">HTTPS (secure web traffic)</text>

  <!-- Port 5432 -->
  <rect x="200" y="145" width="160" height="34" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="280" y="158" text-anchor="middle" fill="#92400e" font-weight="600">Port 5432</text>
  <text x="280" y="171" text-anchor="middle" fill="#d97706" font-size="10">PostgreSQL (database)</text>

  <!-- Browser -->
  <rect x="20" y="100" width="120" height="34" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="113" text-anchor="middle" fill="#5b21b6" font-weight="600">Browser</text>
  <text x="80" y="126" text-anchor="middle" fill="#7c3aed" font-size="10">:443 request</text>

  <!-- Arrow from browser to port 443 -->
  <line x1="142" y1="117" x2="197" y2="117" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Label -->
  <text x="280" y="210" text-anchor="middle" fill="#9ca3af" font-size="10">IP address = the building  ·  Port = the apartment number</text>
</svg>
