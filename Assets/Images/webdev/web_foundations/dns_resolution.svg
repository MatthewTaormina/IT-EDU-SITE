<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="qa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="ans" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="10" y="130" width="100" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="151" text-anchor="middle" fill="#1e40af" font-weight="600">Browser</text>
  <text x="60" y="166" text-anchor="middle" fill="#3b82f6" font-size="10">example.com?</text>

  <!-- Resolver -->
  <rect x="145" y="130" width="110" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="200" y="148" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">Recursive</text>
  <text x="200" y="161" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">Resolver</text>
  <text x="200" y="174" text-anchor="middle" fill="#d97706" font-size="9">(your ISP / 8.8.8.8)</text>

  <!-- Root NS -->
  <rect x="295" y="50" width="110" height="50" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="350" y="68" text-anchor="middle" fill="#5b21b6" font-weight="600" font-size="11">Root Name</text>
  <text x="350" y="81" text-anchor="middle" fill="#5b21b6" font-weight="600" font-size="11">Server</text>
  <text x="350" y="94" text-anchor="middle" fill="#7c3aed" font-size="9">13 root clusters</text>

  <!-- TLD NS -->
  <rect x="295" y="205" width="110" height="50" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="350" y="223" text-anchor="middle" fill="#5b21b6" font-weight="600" font-size="11">TLD Name</text>
  <text x="350" y="236" text-anchor="middle" fill="#5b21b6" font-weight="600" font-size="11">Server</text>
  <text x="350" y="249" text-anchor="middle" fill="#7c3aed" font-size="9">handles .com, .org …</text>

  <!-- Authoritative NS -->
  <rect x="445" y="130" width="110" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="500" y="148" text-anchor="middle" fill="#15803d" font-weight="600" font-size="11">Authoritative</text>
  <text x="500" y="161" text-anchor="middle" fill="#15803d" font-weight="600" font-size="11">Name Server</text>
  <text x="500" y="174" text-anchor="middle" fill="#16a34a" font-size="9">owns the domain</text>

  <!-- IP answer -->
  <rect x="580" y="130" width="70" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="615" y="151" text-anchor="middle" fill="#15803d" font-weight="700" font-size="11">IP Address</text>
  <text x="615" y="166" text-anchor="middle" fill="#16a34a" font-size="9">93.184.216.34</text>

  <!-- Query arrows (gray, going right/up) -->
  <!-- Browser → Resolver -->
  <line x1="111" y1="155" x2="143" y2="155" stroke="#6b7280" stroke-width="1.5" marker-end="url(#qa)"/>
  <text x="127" y="148" text-anchor="middle" fill="#9ca3af" font-size="9">①</text>

  <!-- Resolver → Root -->
  <line x1="255" y1="142" x2="293" y2="88" stroke="#6b7280" stroke-width="1.5" marker-end="url(#qa)"/>
  <text x="266" y="107" text-anchor="middle" fill="#9ca3af" font-size="9">②</text>

  <!-- Resolver → TLD -->
  <line x1="255" y1="168" x2="293" y2="218" stroke="#6b7280" stroke-width="1.5" marker-end="url(#qa)"/>
  <text x="266" y="203" text-anchor="middle" fill="#9ca3af" font-size="9">③</text>

  <!-- Resolver → Authoritative -->
  <line x1="255" y1="155" x2="443" y2="155" stroke="#6b7280" stroke-width="1.5" marker-end="url(#qa)"/>
  <text x="349" y="148" text-anchor="middle" fill="#9ca3af" font-size="9">④</text>

  <!-- Authoritative → IP answer -->
  <line x1="556" y1="155" x2="578" y2="155" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ans)"/>
  <text x="567" y="148" text-anchor="middle" fill="#16a34a" font-size="9">⑤</text>

  <!-- IP returned to browser -->
  <path d="M 615,181 C 615,295 60,295 60,181" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ans)"/>
  <text x="340" y="310" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">IP address returned to browser — cached for future requests</text>

</svg>
