<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 172" font-family="system-ui, -apple-system, sans-serif" font-size="12">

  <!-- Application layer label -->
  <text x="280" y="10" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">APPLICATIONS BUILT ON THE INTERNET</text>

  <!-- The Web block (highlighted) -->
  <rect x="10" y="18" width="170" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="39" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">The Web</text>
  <text x="95" y="55" text-anchor="middle" fill="#3b82f6" font-size="10">HTTP / HTTPS</text>

  <!-- Email block -->
  <rect x="190" y="18" width="85" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="233" y="39" text-anchor="middle" fill="#475569" font-weight="600">Email</text>
  <text x="233" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">SMTP / IMAP</text>

  <!-- Gaming block -->
  <rect x="285" y="18" width="85" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="328" y="39" text-anchor="middle" fill="#475569" font-weight="600">Gaming</text>
  <text x="328" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">Custom</text>

  <!-- SSH block -->
  <rect x="380" y="18" width="75" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="418" y="39" text-anchor="middle" fill="#475569" font-weight="600">SSH</text>
  <text x="418" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">SSH protocol</text>

  <!-- More block -->
  <rect x="465" y="18" width="85" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="508" y="43" text-anchor="middle" fill="#94a3b8" font-weight="600" font-size="16">···</text>

  <!-- Vertical connectors -->
  <line x1="95"  y1="69" x2="95"  y2="84" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="233" y1="69" x2="233" y2="84" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="328" y1="69" x2="328" y2="84" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="418" y1="69" x2="418" y2="84" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="508" y1="69" x2="508" y2="84" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Internet layer -->
  <rect x="10" y="84" width="540" height="72" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="280" y="115" text-anchor="middle" fill="#334155" font-weight="700" font-size="14">The Internet</text>
  <text x="280" y="133" text-anchor="middle" fill="#64748b" font-size="11">Physical infrastructure — cables, routers, data centres</text>
  <text x="280" y="149" text-anchor="middle" fill="#94a3b8" font-size="10">All applications above use the Internet. Only one of them is "The Web."</text>

</svg>
