<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" font-family="system-ui, -apple-system, sans-serif" font-size="13">

  <!-- JS Layer (top) -->
  <rect x="10" y="10" width="540" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="100" y="38" fill="#92400e" font-weight="700" font-size="15">JavaScript</text>
  <text x="100" y="56" fill="#a16207" font-size="11">Behavior — handles events, updates the page, communicates with servers</text>
  <text x="510" y="38" text-anchor="middle" fill="#ca8a04" font-size="11" font-style="italic">.js</text>

  <!-- Layer label -->
  <text x="50" y="43" text-anchor="middle" fill="#b45309" font-weight="700" font-size="11">Layer 3</text>

  <!-- CSS Layer (middle) -->
  <rect x="10" y="90" width="540" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="100" y="118" fill="#5b21b6" font-weight="700" font-size="15">CSS</text>
  <text x="100" y="136" fill="#6d28d9" font-size="11">Presentation — controls colours, fonts, layout, spacing, and animations</text>
  <text x="510" y="118" text-anchor="middle" fill="#7c3aed" font-size="11" font-style="italic">.css</text>

  <text x="50" y="123" text-anchor="middle" fill="#6d28d9" font-weight="700" font-size="11">Layer 2</text>

  <!-- HTML Layer (bottom) -->
  <rect x="10" y="170" width="540" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="198" fill="#1e40af" font-weight="700" font-size="15">HTML</text>
  <text x="100" y="216" fill="#1d4ed8" font-size="11">Structure — defines the content, its meaning, and its hierarchy</text>
  <text x="510" y="198" text-anchor="middle" fill="#3b82f6" font-size="11" font-style="italic">.html</text>

  <text x="50" y="203" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Layer 1</text>

  <!-- Right brace annotation -->
  <text x="542" y="130" text-anchor="middle" fill="#94a3b8" font-size="22" transform="rotate(90, 542, 130)">}</text>
  <text x="555" y="133" text-anchor="start" fill="#64748b" font-size="10">one web page</text>

</svg>
