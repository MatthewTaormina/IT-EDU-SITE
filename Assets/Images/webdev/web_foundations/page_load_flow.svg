<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Step 1: URL typed -->
  <circle cx="30" cy="36" r="14" fill="#3b82f6" stroke="none"/>
  <text x="30" y="41" text-anchor="middle" fill="white" font-weight="700">1</text>
  <rect x="54" y="22" width="350" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="68" y="40" fill="#1e40af" font-weight="600">URL entered in browser address bar</text>

  <!-- Step 2: DNS -->
  <line x1="30" y1="51" x2="30" y2="71" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="85" r="14" fill="#7c3aed" stroke="none"/>
  <text x="30" y="90" text-anchor="middle" fill="white" font-weight="700">2</text>
  <rect x="54" y="71" width="350" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="68" y="89" fill="#5b21b6" font-weight="600">DNS resolves domain → IP address</text>
  <text x="415" y="89" fill="#7c3aed" font-size="10" font-style="italic">Covered in lesson 07</text>

  <!-- Step 3: HTTP Request -->
  <line x1="30" y1="100" x2="30" y2="120" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="134" r="14" fill="#d97706" stroke="none"/>
  <text x="30" y="139" text-anchor="middle" fill="white" font-weight="700">3</text>
  <rect x="54" y="120" width="350" height="28" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="68" y="138" fill="#92400e" font-weight="600">Browser sends HTTP GET request to server</text>

  <!-- Step 4: Server responds -->
  <line x1="30" y1="149" x2="30" y2="169" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="183" r="14" fill="#16a34a" stroke="none"/>
  <text x="30" y="188" text-anchor="middle" fill="white" font-weight="700">4</text>
  <rect x="54" y="169" width="350" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="68" y="187" fill="#15803d" font-weight="600">Server responds: 200 OK + HTML document</text>

  <!-- Step 5: Parse HTML / build DOM -->
  <line x1="30" y1="198" x2="30" y2="218" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="232" r="14" fill="#0891b2" stroke="none"/>
  <text x="30" y="237" text-anchor="middle" fill="white" font-weight="700">5</text>
  <rect x="54" y="218" width="350" height="28" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="68" y="236" fill="#0c4a6e" font-weight="600">Browser parses HTML, begins building DOM</text>

  <!-- Step 6: Fetch sub-resources -->
  <line x1="30" y1="247" x2="30" y2="267" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="281" r="14" fill="#0891b2" stroke="none"/>
  <text x="30" y="286" text-anchor="middle" fill="white" font-weight="700">6</text>
  <rect x="54" y="267" width="350" height="28" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="68" y="285" fill="#0c4a6e" font-weight="600">CSS, images, and fonts fetched (parallel HTTP requests)</text>

  <!-- Step 7: Scripts -->
  <line x1="30" y1="296" x2="30" y2="316" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="330" r="14" fill="#db2777" stroke="none"/>
  <text x="30" y="335" text-anchor="middle" fill="white" font-weight="700">7</text>
  <rect x="54" y="316" width="350" height="28" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="68" y="334" fill="#831843" font-weight="600">JavaScript executed (blocking / defer / async)</text>

  <!-- Script timing detail box -->
  <rect x="68" y="352" width="336" height="72" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="82" y="370" fill="#374151" font-weight="600" font-size="11">Script loading modes:</text>
  <text x="82" y="386" fill="#6b7280" font-family="monospace" font-size="10">&lt;script&gt;          → blocks HTML parsing until run</text>
  <text x="82" y="400" fill="#6b7280" font-family="monospace" font-size="10">&lt;script defer&gt;    → runs after HTML fully parsed</text>
  <text x="82" y="414" fill="#6b7280" font-family="monospace" font-size="10">&lt;script async&gt;   → runs as soon as downloaded</text>

  <!-- Step 8: Render -->
  <line x1="30" y1="345" x2="30" y2="440" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="30" cy="454" r="14" fill="#16a34a" stroke="none"/>
  <text x="30" y="459" text-anchor="middle" fill="white" font-weight="700">8</text>
  <rect x="54" y="440" width="350" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="68" y="458" fill="#15803d" font-weight="600">Render Tree → Layout → Paint → Page visible</text>

  <!-- Caption -->
  <text x="230" y="502" text-anchor="middle" fill="#94a3b8" font-size="10">This is the application-layer view. DNS, HTTP, and the rendering pipeline are each covered in their own lessons.</text>

</svg>
