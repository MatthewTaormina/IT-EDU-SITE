<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" font-family="system-ui, -apple-system, sans-serif" font-size="12">

  <!-- REQUEST SIDE -->
  <text x="140" y="18" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">HTTP Request</text>
  <rect x="10" y="24" width="260" height="240" rx="10" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Request Line -->
  <rect x="10" y="24" width="260" height="42" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="10" y="54" width="260" height="12" fill="#dbeafe"/>
  <text x="140" y="41" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Request Line</text>
  <text x="140" y="58" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">GET /users HTTP/1.1</text>

  <!-- Headers section label -->
  <text x="22" y="86" fill="#374151" font-weight="600" font-size="11">Headers</text>
  <text x="22" y="101" fill="#6b7280" font-family="monospace" font-size="10">Host: api.example.com</text>
  <text x="22" y="115" fill="#6b7280" font-family="monospace" font-size="10">Accept: application/json</text>
  <text x="22" y="129" fill="#6b7280" font-family="monospace" font-size="10">Authorization: Bearer ey...</text>
  <text x="22" y="143" fill="#6b7280" font-family="monospace" font-size="10">User-Agent: Mozilla/5.0</text>

  <!-- Divider line -->
  <line x1="22" y1="158" x2="258" y2="158" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="22" y="175" fill="#374151" font-weight="600" font-size="11">Body (optional — for POST/PUT)</text>
  <text x="22" y="191" fill="#6b7280" font-family="monospace" font-size="10">{"name": "Alice"}</text>

  <!-- Method labels -->
  <rect x="22" y="215" width="236" height="38" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="140" y="229" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">Common Methods</text>
  <text x="140" y="244" text-anchor="middle" fill="#3b82f6" font-size="9">GET · POST · PUT · PATCH · DELETE</text>

  <!-- RESPONSE SIDE -->
  <text x="440" y="18" text-anchor="middle" fill="#15803d" font-weight="700" font-size="13">HTTP Response</text>
  <rect x="310" y="24" width="260" height="240" rx="10" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Status line -->
  <rect x="310" y="24" width="260" height="42" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="310" y="54" width="260" height="12" fill="#dcfce7"/>
  <text x="440" y="41" text-anchor="middle" fill="#15803d" font-weight="700" font-size="11">Status Line</text>
  <text x="440" y="58" text-anchor="middle" fill="#16a34a" font-family="monospace" font-size="10">HTTP/1.1 200 OK</text>

  <!-- Response headers -->
  <text x="322" y="86" fill="#374151" font-weight="600" font-size="11">Headers</text>
  <text x="322" y="101" fill="#6b7280" font-family="monospace" font-size="10">Content-Type: application/json</text>
  <text x="322" y="115" fill="#6b7280" font-family="monospace" font-size="10">Content-Length: 512</text>
  <text x="322" y="129" fill="#6b7280" font-family="monospace" font-size="10">Cache-Control: max-age=3600</text>
  <text x="322" y="143" fill="#6b7280" font-family="monospace" font-size="10">Set-Cookie: session=abc123</text>

  <!-- Divider -->
  <line x1="322" y1="158" x2="558" y2="158" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="322" y="175" fill="#374151" font-weight="600" font-size="11">Body</text>
  <text x="322" y="191" fill="#6b7280" font-family="monospace" font-size="10">{"users": [{"id": 1, ...}]}</text>

  <!-- Status code families -->
  <rect x="322" y="215" width="236" height="38" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="440" y="229" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">Status Code Families</text>
  <text x="440" y="244" text-anchor="middle" fill="#16a34a" font-size="9">2xx Success · 3xx Redirect · 4xx Client Error · 5xx Server Error</text>

  <!-- Arrow between -->
  <text x="290" y="148" text-anchor="middle" fill="#9ca3af" font-size="18">⇄</text>

  <!-- Caption -->
  <text x="290" y="285" text-anchor="middle" fill="#94a3b8" font-size="10">Both the request and response consist of: a start line, headers, a blank line, and an optional body.</text>

</svg>
