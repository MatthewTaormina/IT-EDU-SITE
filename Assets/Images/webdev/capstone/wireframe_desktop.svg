  <rect x="650" y="492" width="120" height="9" fill="#d4d4d4" rx="2"/>
  <rect x="650" y="508" width="180" height="7" fill="#e8e8e8" rx="2"/>
  <rect x="650" y="521" width="148" height="7" fill="#e8e8e8" rx="2"/>
  <!-- Label -->
  <text x="8" y="478" font-size="9" fill="#999" text-anchor="middle" transform="rotate(-90,8,478)">④ PROJECTS</text>

