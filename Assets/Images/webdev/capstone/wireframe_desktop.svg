<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 740" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">

  <!-- Page background -->
  <rect width="960" height="740" fill="#ffffff"/>

