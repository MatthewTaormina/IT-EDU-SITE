  <rect x="40" y="700" width="912" height="32" fill="#1a1a2e" rx="0"/>
  <text x="480" y="720" text-anchor="middle" font-size="9" fill="#888">© 2025 Maya Chen · Built with HTML, CSS &amp; JavaScript</text>

  <!-- ─── OUTER BORDER ───────────────────────────────────────────── -->
  <rect x="40" y="8" width="912" height="724" fill="none" stroke="#aaaaaa" stroke-width="1.5" rx="3"/>

  <!-- ─── TITLE ──────────────────────────────────────────────────── -->
  <text x="480" y="738" text-anchor="middle" font-size="8" fill="#bbb" letter-spacing="1">DESKTOP WIREFRAME — 1280px — All measurements proportional</text>
