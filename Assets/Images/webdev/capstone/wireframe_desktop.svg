  <rect x="638" y="424" width="258" height="120" fill="#fff" stroke="#d0d0d0" rx="6"/>
  <rect x="638" y="424" width="258" height="56" fill="#e2e2e2" rx="6"/>
  <rect x="638" y="468" width="258" height="12" fill="#e2e2e2" rx="0"/>
