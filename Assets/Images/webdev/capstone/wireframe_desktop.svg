  <rect x="312" y="588" width="84" height="20" fill="#eef1fb" stroke="#b0c0e8" rx="10"/>
  <text x="354" y="602" text-anchor="middle" font-size="9" fill="#2d6ef0">JavaScript</text>
  <rect x="406" y="588" width="44" height="20" fill="#eef1fb" stroke="#b0c0e8" rx="10"/>
  <text x="428" y="602" text-anchor="middle" font-size="9" fill="#2d6ef0">Git</text>
  <rect x="460" y="588" width="88" height="20" fill="#eef1fb" stroke="#b0c0e8" rx="10"/>
  <text x="504" y="602" text-anchor="middle" font-size="9" fill="#2d6ef0">Figma</text>
  <rect x="558" y="588" width="96" height="20" fill="#eef1fb" stroke="#b0c0e8" rx="10"/>
  <text x="606" y="602" text-anchor="middle" font-size="9" fill="#2d6ef0">Responsive</text>
  <rect x="664" y="588" width="100" height="20" fill="#eef1fb" stroke="#b0c0e8" rx="10"/>
  <text x="714" y="602" text-anchor="middle" font-size="9" fill="#2d6ef0">Typography</text>
  <!-- Label -->
  <text x="8" y="594" font-size="9" fill="#999" text-anchor="middle" transform="rotate(-90,8,594)">⑤ SKILLS</text>

  <!-- ─── SECTION 6 — CONTACT (y 624–700) ──────────────────────────── -->
  <rect x="40" y="624" width="912" height="100" fill="#f8f8f8" stroke="#c0c0c0" stroke-width="1.5"/>
  <text x="480" y="648" text-anchor="middle" font-size="9" fill="#aaa" letter-spacing="2.5" font-weight="bold">C O N T A C T</text>
