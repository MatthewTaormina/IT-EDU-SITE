  <rect x="363" y="492" width="120" height="9" fill="#d4d4d4" rx="2"/>
  <rect x="363" y="508" width="180" height="7" fill="#e8e8e8" rx="2"/>
  <rect x="363" y="521" width="148" height="7" fill="#e8e8e8" rx="2"/>
